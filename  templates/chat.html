<!DOCTYPE html>
<html>
<head>
    <title>Chat - Secure Messenger</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h2>Secure Chat</h2>
            <div class="user-info">
                <span>Your Address: {{ address[:10] }}...</span>
                <button onclick="showMnemonic()">Show Mnemonic</button>
                <button onclick="location.href='/groups'">Groups</button>
                <button onclick="location.href='/logout'">Logout</button>
            </div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="message-form">
            <input type="text" id="recipient" placeholder="Recipient Address">
            <div id="emojiPickerContainer"></div>
            <button type="button" onclick="toggleEmojiPicker()">😀</button>
            <textarea id="message" placeholder="Type your message..."></textarea>
            <div class="file-upload">
                <input type="file" id="fileInput" accept="image/*">
                <button type="button" onclick="uploadFile()">📎</button>
            </div>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
