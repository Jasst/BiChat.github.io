{% extends "base.html" %}

{% block title %}Dark Messenger{% endblock %}

{% block content %}
<div id="app" data-user-address="{{ address }}"></div>

<div class="chat-layout">
  <!-- Левая панель: список чатов -->
  <div class="conversations-panel" id="conversationsPanel">
    <div class="conversations-header">
      <h3>Chats</h3>
      <div class="header-actions">
        <button id="aiChatBtn" class="btn-icon-oval" title="AI Assistant">🤖</button>
        <button id="newChatBtn" class="btn-icon-oval" title="New chat">＋</button>
      </div>
    </div>
    <div class="conversations-list" id="conversationsList">
      <div class="empty-state"><div class="icon">💬</div><p>Select or start a conversation</p></div>
    </div>
  </div>

  <!-- Правая панель: сообщения -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-panel-header">
      <button class="back-button" id="backToConversationsBtn" aria-label="Back">←</button>
      <div class="title">
        <span id="currentChatName">Select a conversation</span>
        <span class="subtitle" id="chatSubtitle"></span>
      </div>
      <div class="actions">
        <button id="addToContactsBtn" class="btn-icon-oval" disabled title="Add to contacts">＋</button>
        <button id="clearConversationBtn" class="btn-icon-oval" disabled title="Clear messages">🗑</button>
      </div>
    </div>

    <div class="messages" id="messagesContainer" role="log" aria-live="polite">
      <div class="empty-state" id="emptyState"><div class="icon">👋</div><p>Select a conversation to start chatting</p></div>
    </div>

    <form class="input-area" onsubmit="sendMessage(); return false;">
      <div class="input-wrapper">
        <textarea id="messageContent" placeholder="Type a message…" rows="1" disabled aria-label="Message input"></textarea>
        <div class="input-actions">
          <input type="file" id="imageInput" accept="image/*" class="sr-only">
          <button type="button" class="btn-icon-oval" id="attachImageButton" disabled title="Attach image">📎</button>
          <button type="button" class="btn-icon-oval" id="recordAudioButton" disabled title="Record voice message">🎤</button>
          <button type="submit" class="btn-primary-oval" id="sendButton" disabled style="display: none;">➤</button>
        </div>
      </div>
    </form>

    <!-- AI CHAT CONTAINER -->
    <div id="aiChatContainer" class="hidden">
      <div class="chat-panel-header">
        <button class="back-button" id="closeAiFromChatBtn">←</button>
        <div class="title">
          <span>🤖 AI Assistant</span>
          <span class="subtitle" id="aiStatusSubtitle">Internet · Streaming</span>
        </div>
        <div class="actions">
          <button type="button" id="aiClearHistoryBtn" class="btn-icon-oval" title="Clear history">🗑</button>
        </div>
      </div>
      <div id="aiMessagesContainer" class="messages"></div>
      <form class="input-area" onsubmit="return false;">
        <div class="input-wrapper">
          <textarea id="aiMessageInput" placeholder="Ask AI… (paste a link to read)" rows="1"></textarea>
          <div class="input-actions-left">
            <button type="button" id="aiImageGenBtn" class="ai-tool-btn" data-tooltip="Generate image" style="display: none;">🎨</button>
            <button type="button" id="aiInternetBtn" class="ai-tool-btn" data-tooltip="Web search on/off" data-active="false">🌐</button>
            <button type="button" id="aiReasoningBtn" class="ai-tool-btn" data-tooltip="Reasoning on/off" data-active="false">🧠</button>
          </div>
          <div class="input-actions-right">
            <input type="file" id="aiImageInput" accept="image/*" class="sr-only">
            <button type="button" id="aiAttachBtn" class="btn-icon-oval" title="Attach image">📎</button>
            <button type="submit" id="aiSendBtn" class="btn-primary-oval">➤</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- New chat modal (без изменений) -->
<div id="newChatModal" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <header class="modal-header">
      <h3>Start New Chat</h3>
      <button class="modal-close" onclick="closeNewChatModal()">&times;</button>
    </header>
    <div class="modal-body">
      <div class="text-center">
        <button class="btn-oval" onclick="openQRScannerInModal()">📷 Scan QR Code</button>
        <div id="qrScannerContainerModal" class="hidden">
          <div style="position:relative;display:inline-block;">
            <video id="qrVideoModal" style="width:200px;height:200px;border-radius:var(--radius-md);background:#000;"></video>
            <div style="position:absolute;inset:0;border:2px solid var(--accent);border-radius:var(--radius-md);pointer-events:none;"></div>
          </div>
          <p class="text-muted">Point camera at QR code</p>
          <button class="btn-oval" onclick="forceCloseQRScannerInModal()">Cancel</button>
        </div>
        <div id="scanResultModal" class="hidden scan-result"></div>
      </div>
      <div class="form-group">
        <label class="text-secondary">Select from contacts</label>
        <select id="newChatSelect" class="input"><option value="">-- Choose a contact --</option></select>
      </div>
      <div class="form-group">
        <label class="text-secondary">Or enter address</label>
        <input type="text" id="newChatAddress" class="input input-monospace" placeholder="64-character hex address" maxlength="64">
      </div>
    </div>
    <footer class="modal-footer">
      <button class="btn-oval" onclick="closeNewChatModal()">Cancel</button>
      <button class="btn-primary-oval" id="startNewChatBtn" onclick="startNewChat()">Start Chat</button>
    </footer>
  </div>
</div>

<!-- Image modal -->
<div id="imageModal" class="modal-overlay hidden">
  <div class="modal" style="max-width:90vw;max-height:90vh;background:transparent;border:none;box-shadow:none;">
    <button class="modal-close" onclick="closeImageModal()" style="position:absolute;top:16px;right:16px;color:var(--text-primary);z-index:1;">&times;</button>
    <img id="modalImage" src="" alt="Full size" style="max-width:100%;max-height:90vh;border-radius:var(--radius-md);">
    <div class="text-center" style="margin-top:16px;">
      <button class="btn-primary-oval" id="downloadImageBtn">Download</button>
    </div>
  </div>
</div>

<script>window.process = window.process || { env: {} };</script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="{{ url_for('static', path='js/WebSocketClient.js') }}"></script>
<script src="{{ url_for('static', path='js/ui.js') }}"></script>
<script src="{{ url_for('static', path='js/actions.js') }}"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="{{ url_for('static', path='js/AiChat.js') }}" defer></script>

<script>
// Адаптивная логика (без изменений)
(function() {
  const conversationsPanel = document.getElementById('conversationsPanel');
  const chatPanel = document.getElementById('chatPanel');
  const backBtn = document.getElementById('backToConversationsBtn');

  function isMobile() { return window.innerWidth < 768; }

  if (!isMobile()) {
    conversationsPanel.style.display = 'flex';
    chatPanel.style.display = 'flex';
  }

  window.showConversationsList = function() {
    if (!isMobile()) return;
    conversationsPanel.style.display = 'flex';
    chatPanel.style.display = 'none';
    document.body.classList.remove('chat-open');
  };

  window.showChatPanel = function() {
    if (!isMobile()) return;
    conversationsPanel.style.display = 'none';
    chatPanel.style.display = 'flex';
    document.body.classList.add('chat-open');
  };

  if (backBtn) {
    backBtn.addEventListener('click', () => {
      if (window.State?.currentChatAddress === 'ai_bot') {
        const firstConv = document.querySelector('.conversation-item');
        if (firstConv?.dataset.address) {
          window.selectConversation(firstConv.dataset.address, '', firstConv.dataset.isGroup === '1');
        } else {
          if (isMobile()) window.showConversationsList();
        }
      } else {
        if (isMobile()) window.showConversationsList();
      }
    });
  }

  const originalSelect = window.selectConversation;
  if (originalSelect) {
    window.selectConversation = function(address, name, isGroup) {
      originalSelect(address, name, isGroup);
      if (isMobile() && address) {
        if (address === 'ai_bot' || (address && address !== '')) {
          window.showChatPanel();
        }
      }
    };
  }

  window.addEventListener('resize', () => {
    if (!isMobile()) {
      conversationsPanel.style.display = 'flex';
      chatPanel.style.display = 'flex';
      document.body.classList.remove('chat-open');
    } else {
      const activeChat = window.State?.currentChatAddress;
      if (!activeChat || activeChat === '') {
        window.showConversationsList();
      } else {
        window.showChatPanel();
      }
    }
  });

  const closeAiBtn = document.getElementById('closeAiFromChatBtn');
  if (closeAiBtn) {
    closeAiBtn.addEventListener('click', () => {
      if (window.State?.currentChatAddress === 'ai_bot') {
        const firstConv = document.querySelector('.conversation-item');
        if (firstConv?.dataset.address) {
          window.selectConversation(firstConv.dataset.address, '', firstConv.dataset.isGroup === '1');
        } else {
          if (isMobile()) window.showConversationsList();
        }
      } else {
        if (isMobile()) window.showConversationsList();
      }
    });
  }

  if (isMobile() && !window.location.search.includes('start_with')) {
    window.showConversationsList();
  }
  if (window.location.search.includes('start_with')) {
    setTimeout(() => { if (isMobile()) window.showChatPanel(); }, 200);
  }

  document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const startWith = urlParams.get('start_with');
    const startName = urlParams.get('name');
    if (startWith) {
      const trySelect = (attempt = 1) => {
        if (typeof window.selectConversation === 'function') {
          window.selectConversation(
            startWith,
            startName || (startWith.startsWith('group:') ? 'Group' : startWith.slice(0, 10) + '…'),
            startWith.startsWith('group:')
          );
        } else if (attempt <= 3) {
          setTimeout(() => trySelect(attempt + 1), 500);
        }
      };
      setTimeout(() => trySelect(), 300);
    }
  });
})();
</script>
{% endblock %}
