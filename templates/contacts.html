{% extends "base.html" %}
{% block content %}
<div class="chat-container">
    <div class="sidebar">
        <div class="user-info">
            <p>Your Address: <span id="userAddress">{{ address[:10] }}...</span></p>
            <button onclick="location.href='/logout'">Logout</button>
        </div>

        <!-- Навигация в виде вкладок -->
        <div class="tabs">
            <div class="tab {% if request.endpoint == 'chat' %}active{% endif %}" onclick="location.href='/chat'">Chat</div>
            <div class="tab {% if request.endpoint == 'contacts' %}active{% endif %}" onclick="location.href='/contacts'">Contacts</div>
            <div class="tab {% if request.endpoint == 'groups' %}active{% endif %}" onclick="location.href='/groups'">Groups</div>
            <div class="tab {% if request.endpoint == 'profile' %}active{% endif %}" onclick="location.href='/profile'">Profile</div>
        </div>
    </div>

    <div class="main-content">
        <h2>Contacts</h2>

        <!-- Сканер QR-кода -->
        <div class="info-item">
            <button onclick="openQRScanner()" class="scan-qr-btn">
                📷 Scan QR Code to Add Contact
            </button>
            <div id="qrScannerContainer" style="display: none; margin: 15px 0;">
                <div style="position: relative;">
                    <video id="qrVideo" style="width: 100%; max-width: 300px; border: 2px solid #333; border-radius: 8px; background-color: #000;"></video>
                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border: 2px solid #bb86fc; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);"></div>
                </div>
                <p style="color: #aaa; font-size: 12px; text-align: center; margin: 5px 0;">Point camera at QR code</p>
                <div id="scanResult" style="margin: 10px 0; color: green; font-weight: bold; display: none;"></div>
                <button onclick="forceCloseQRScanner()" style="margin-top: 10px; background-color: #cf6679; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; width: 100%;">Cancel Scan</button>
            </div>
        </div>

        <div class="contacts-list" id="contactsList">
            <p id="noContactsMessage">Loading contacts...</p>
        </div>

        <div class="input-area">
            <input type="text" id="contactName" placeholder="Contact Name">
            <input type="text" id="contactAddress" placeholder="Contact Address (64 hex chars)">
            <button onclick="addContact()">Add Contact</button>
        </div>
    </div>
</div>

<style>
/* === Стили для контактов === */
.contacts-ul { list-style: none; padding: 0; margin: 0; }

.contact-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px; margin: 8px 0; background: #2c2c2c;
    border-radius: 6px; border-left: 3px solid #bb86fc;
    transition: background 0.2s;
}
.contact-item:hover { background: #333; }

.contact-info-wrapper {
    flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; margin-right: 10px;
}
.contact-name {
    font-weight: 600; color: #fff; font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.contact-address-row { display: flex; align-items: center; gap: 6px; }

.contact-address {
    flex: 1; font-family: 'Consolas', 'Monaco', monospace; font-size: 10px;
    color: #888; background: #1a1a1a; padding: 3px 6px; border-radius: 3px;
    overflow-x: auto; white-space: nowrap; cursor: pointer;
    transition: color 0.2s; user-select: all;
}
.contact-address:hover { color: #bb86fc; background: #252525; }

.copy-btn, .chat-btn {
    flex-shrink: 0; background: #333; border: 1px solid #555;
    color: #aaa; padding: 2px 6px; border-radius: 3px;
    cursor: pointer; font-size: 11px; transition: all 0.2s ease; line-height: 1;
    text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
}
.copy-btn:hover { background: #bb86fc; color: #121212; border-color: #bb86fc; }
.copy-btn.copied { background: #00c853 !important; color: white !important; }
.chat-btn:hover { background: #03dac6; color: #121212; border-color: #03dac6; }

.contact-actions { display: flex; gap: 4px; }

.delete-btn {
    background: #cf6679; color: white; border: none;
    padding: 6px 12px; border-radius: 4px; cursor: pointer;
    font-size: 12px; transition: background 0.2s;
}
.delete-btn:hover { background: #b00020; }

/* === Стили для QR-сканера === */
.scan-qr-btn {
    background-color: #bb86fc; color: #121212; border: none;
    padding: 12px 20px; border-radius: 4px; cursor: pointer;
    font-weight: bold; width: 100%; margin-bottom: 15px;
}
.scan-qr-btn:hover { background-color: #3700b3; }

/* === Общие стили === */
.status-active { color: #00c853; font-weight: bold; }
.security-info {
    background-color: #2c2c2c; padding: 15px; border-radius: 4px;
    border-left: 3px solid #bb86fc;
}
.input-area {
    display: flex; gap: 8px; margin-top: 20px; padding: 15px;
    background: #2c2c2c; border-radius: 6px;
}
.input-area input {
    flex: 1; padding: 8px 12px; border: 1px solid #444;
    border-radius: 4px; background: #1a1a1a; color: #fff; font-size: 13px;
}
.input-area input:focus { outline: none; border-color: #bb86fc; }
.input-area button {
    background: #bb86fc; color: #121212; border: none;
    padding: 8px 16px; border-radius: 4px; cursor: pointer;
    font-weight: bold; transition: background 0.2s;
}
.input-area button:hover { background: #3700b3; }
.error { color: #cf6679; font-weight: 500; }

/* Адаптивность */
@media (max-width: 600px) {
    .contact-address { font-size: 9px; }
    .contact-name { font-size: 13px; }
    .input-area { flex-direction: column; }
    .input-area input, .input-area button { width: 100%; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
    // === Глобальные переменные для сканера ===
    let scanInterval = null;
    let stream = null;
    let isScanning = false;

    // === Защита от XSS ===
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // === Копирование адреса ===
    function copyAddress(elementId) {
        const element = document.getElementById(elementId);
        if (!element) return;
        const address = element.textContent.trim();

        navigator.clipboard.writeText(address).then(() => {
            const btn = element.nextElementSibling;
            if (btn && btn.classList.contains('copy-btn')) {
                const original = btn.textContent;
                btn.textContent = '✓';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = original;
                    btn.classList.remove('copied');
                }, 1500);
            }
            element.style.color = '#00c853';
            setTimeout(() => { element.style.color = ''; }, 1500);
        }).catch(err => {
            console.error('Copy failed:', err);
            if (element.select) {
                element.select();
                document.execCommand('copy');
                alert('Address copied!');
            }
        });
    }

    // === Начать чат с контактом ===
    function startChatWith(address, name) {
        // Переходим на /chat и открываем диалог
        window.location.href = `/chat?start_with=${encodeURIComponent(address)}&name=${encodeURIComponent(name)}`;
    }

    // Клик по адресу тоже копирует
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('contact-address')) {
            copyAddress(e.target.id);
        }
    });

    // === Загрузка контактов ===
    async function loadContacts() {
        const container = document.getElementById('contactsList');
        const noContactsMsg = document.getElementById('noContactsMessage');
        if (!container) { console.error('❌ #contactsList not found'); return; }

        try {
            const response = await fetch('/get_contacts');
            const data = await response.json();
            container.innerHTML = '';

            if (response.ok && data.contacts && data.contacts.length > 0) {
                if (noContactsMsg) noContactsMsg.style.display = 'none';
                const ul = document.createElement('ul');
                ul.className = 'contacts-ul';

                data.contacts.forEach((contact, index) => {
                    const li = document.createElement('li');
                    li.className = 'contact-item';
                    li.dataset.address = contact.address;
                    // ✅ Добавлена кнопка 💬 для начала чата
                    li.innerHTML = `
                        <div class="contact-info-wrapper">
                            <div class="contact-name" title="${escapeHtml(contact.name)}">
                                ${escapeHtml(contact.name)}
                            </div>
                            <div class="contact-address-row">
                                <code class="contact-address" id="addr-${index}"
                                      title="Click to copy: ${contact.address}">
                                    ${contact.address}
                                </code>
                                <div class="contact-actions">
                                    <button class="copy-btn" onclick="copyAddress('addr-${index}')"
                                            title="Copy address">📋</button>
                                    <button class="chat-btn" onclick="startChatWith('${contact.address}', '${escapeHtml(contact.name)}')"
                                            title="Start chat">💬</button>
                                </div>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteContact('${contact.address}', this)"
                                title="Delete contact">✕</button>
                    `;
                    ul.appendChild(li);
                });
                container.appendChild(ul);
            } else {
                if (noContactsMsg) {
                    noContactsMsg.style.display = 'block';
                    noContactsMsg.textContent = data.error ? `Error: ${data.error}` : 'No contacts found. Add one!';
                } else {
                    container.innerHTML = '<p>No contacts found.</p>';
                }
            }
        } catch (error) {
            console.error('❌ Error loading contacts:', error);
            container.innerHTML = `<p class="error">⚠️ Failed to load contacts. Is server running?</p>`;
        }
    }

    // === Добавление контакта ===
    async function addContact() {
        const nameInput = document.getElementById('contactName');
        const addressInput = document.getElementById('contactAddress');
        const name = nameInput?.value.trim() || '';
        const address = addressInput?.value.trim() || '';

        console.log('📤 addContact called:', { name, address: address.substring(0, 16) + '...' });

        if (!name || !address) { alert('Please fill in both name and address.'); return; }
        if (address.length !== 64 || !/^[a-fA-F0-9]{64}$/.test(address)) {
            alert('Invalid address format. Must be 64 hex characters.'); return;
        }

        try {
            const response = await fetch('/add_contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ name, address })
            });
            console.log('📥 Response status:', response.status);
            const data = await response.json();
            console.log('📥 Response ', data);

            if (response.ok) {
                if (nameInput) nameInput.value = '';
                if (addressInput) addressInput.value = '';
                await loadContacts();
                alert('✅ Contact added successfully!');
            } else if (response.status === 404) {
                alert('❌ Error: Route not found (404).\n\nTry:\n1. Restart the server\n2. Check app.py syntax\n3. Verify /add_contact route exists');
                console.error('❌ 404 - Route /add_contact not registered');
            } else if (response.status === 401) {
                alert('❌ Session expired. Please login again.');
                window.location.href = '/login';
            } else if (response.status === 400) {
                alert('❌ Validation error: ' + (data.error || 'Invalid data'));
            } else {
                alert('❌ Error ' + response.status + ': ' + (data.error || 'Unknown error'));
            }
        } catch (error) {
            console.error('💥 Network error:', error);
            alert('❌ Network error. Is server running at http://localhost:5000 ?');
        }
    }

    // === Удаление контакта ===
    async function deleteContact(address, buttonElement) {
        if (!confirm("Are you sure you want to delete this contact?")) return;
        try {
            buttonElement.disabled = true; buttonElement.textContent = '...';
            const response = await fetch('/delete_contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address })
            });
            const data = await response.json();
            if (response.ok) {
                buttonElement.closest('li')?.remove();
                const items = document.querySelectorAll('.contact-item');
                if (items.length === 0 && document.getElementById('noContactsMessage')) {
                    document.getElementById('noContactsMessage').style.display = 'block';
                    document.getElementById('noContactsMessage').textContent = 'No contacts found. Add one!';
                }
                alert('✅ Contact deleted.');
            } else if (response.status === 404) {
                buttonElement.closest('li')?.remove();
                alert('Contact not found (already deleted?).');
            } else {
                alert('Error: ' + (data.error || 'Unknown'));
                buttonElement.disabled = false; buttonElement.textContent = '✕';
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Network error while deleting.');
            buttonElement.disabled = false; buttonElement.textContent = '✕';
        }
    }

    // === QR-сканер функции ===
    function openQRScanner() {
        const scannerContainer = document.getElementById('qrScannerContainer');
        const video = document.getElementById('qrVideo');
        const scanResult = document.getElementById('scanResult');
        if (!scannerContainer || !video) { console.error('QR Scanner elements not found'); return; }
        scannerContainer.style.display = 'block';
        if (scanResult) { scanResult.style.display = 'none'; scanResult.textContent = ''; }

        if (navigator.mediaDevices?.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(function(mediaStream) {
                    stream = mediaStream; video.srcObject = stream; video.play();
                    isScanning = true; startScanning();
                })
                .catch(function(err) {
                    console.error("Camera error:", err);
                    alert('Camera error: ' + (err.message || 'Unknown'));
                    forceCloseQRScanner();
                });
        } else {
            alert('Camera not supported in this browser.');
            forceCloseQRScanner();
        }
    }

    function startScanning() {
        const video = document.getElementById('qrVideo');
        const scanResult = document.getElementById('scanResult');
        if (!video || !isScanning) return;
        scanInterval = setInterval(function() {
            if (!isScanning) { stopScanning(); return; }
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                try {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    if (code?.data) {
                        let address = '';
                        if (code.data.length === 64 && /^[a-fA-F0-9]{64}$/.test(code.data)) {
                            address = code.data;
                        } else if (code.data.startsWith('bitcoin:')) {
                            const m = code.data.match(/bitcoin:([a-zA-Z0-9]{26,})/);
                            if (m?.[1]) address = m[1];
                        }
                        if (address) {
                            const addrInput = document.getElementById('contactAddress');
                            if (addrInput) addrInput.value = address;
                            if (scanResult) {
                                scanResult.textContent = '✓ Address scanned! Enter name.';
                                scanResult.style.display = 'block';
                            }
                            stopScanning();
                            setTimeout(() => forceCloseQRScanner(), 100);
                        }
                    }
                } catch (e) { console.log('Scan error:', e); }
            }
        }, 300);
    }

    function stopScanning() { isScanning = false; if (scanInterval) { clearInterval(scanInterval); scanInterval = null; } }

    function forceCloseQRScanner() {
        const container = document.getElementById('qrScannerContainer');
        const video = document.getElementById('qrVideo');
        if (container) container.style.display = 'none';
        stopScanning();
        if (stream) { stream.getTracks().forEach(t => { if (t.readyState === 'live') t.stop(); }); stream = null; }
        if (video) { if (video.srcObject) video.srcObject = null; video.pause(); video.load(); }
        const result = document.getElementById('scanResult');
        if (result) { result.style.display = 'none'; result.textContent = ''; }
    }

    // === Инициализация + обработка ?start_with= параметра ===
    document.addEventListener('DOMContentLoaded', function() {
        loadContacts();
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') forceCloseQRScanner(); });

        // ✅ Если открыли с ?start_with= — сразу начинаем чат
        const urlParams = new URLSearchParams(window.location.search);
        const startWith = urlParams.get('start_with');
        const startName = urlParams.get('name');
        if (startWith && startName) {
            // Ждём немного, чтобы страница прогрузилась
            setTimeout(() => {
                if (typeof startChatWith === 'function') {
                    startChatWith(startWith, startName);
                }
            }, 500);
        }
    });
    window.addEventListener('beforeunload', forceCloseQRScanner);
    window.addEventListener('blur', forceCloseQRScanner);
</script>
{% endblock %}
