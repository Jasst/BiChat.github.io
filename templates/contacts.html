{% extends "base.html" %}

{% block title %}Contacts — Dark Messenger{% endblock %}

{% block content %}
<div class="chat-container">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="Navigation">
    <header class="sidebar-header">
      <div class="user-info">
        <span class="address font-mono" id="userAddress">{{ address[:10] }}…</span>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab" onclick="location.href='/chat'">Chat</button>
      <button class="tab active" role="tab" aria-selected="true" onclick="location.href='/contacts'">Contacts</button>
      <button class="tab" onclick="location.href='/groups'">Groups</button>
      <button class="tab" onclick="location.href='/profile'">Profile</button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="chat-header">
      <!-- ✅ Кнопка меню для мобильных -->
      <button class="btn btn-icon menu-toggle" id="menuToggle"
              onclick="toggleSidebar()" aria-label="Toggle menu"
              style="display: none;">☰</button>

      <h2>Contacts</h2>
      <button class="btn btn-primary" onclick="openQRScanner()">📷 Scan QR</button>
    </header>

    <!-- QR Scanner -->
    <div id="qrScannerContainer" class="hidden" style="padding: var(--space-md); background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
      <div class="text-center">
        <div style="position: relative; display: inline-block; margin-bottom: var(--space-sm);">
          <!-- ✅ FIX: добавлен transform: scaleX(-1) для корректного отображения -->
          <video id="qrVideo"
                 style="width: 200px; height: 200px; border-radius: var(--radius-md); background: #000; "
                 playsinline
                 autoplay
                 muted
                 disablepictureinpicture>
          </video>
          <div style="position: absolute; inset: 0; border: 2px solid var(--accent); border-radius: var(--radius-md); pointer-events: none;"></div>
        </div>
        <p class="text-muted" style="font-size: 12px;">Point camera at QR code</p>
        <div id="scanResult" class="hidden" style="margin-top: var(--space-sm); color: var(--status-success); font-weight: 500;"></div>
        <button class="btn btn-ghost" onclick="forceCloseQRScanner()" style="margin-top: var(--space-sm);">Cancel</button>
      </div>
    </div>

    <!-- Contacts List -->
    <div class="list-container" id="contactsList">
      <div class="loading">Loading contacts…</div>
    </div>

    <!-- Add Contact Form -->
    <div style="padding: var(--space-md); border-top: 1px solid var(--border-color); background: var(--bg-secondary);">
      <div style="display: flex; gap: var(--space-sm);">
        <input type="text" id="contactName" class="input" placeholder="Name" style="flex: 1;">
        <input type="text" id="contactAddress" class="input input-monospace" placeholder="64-char address" maxlength="64" style="flex: 2;">
        <button class="btn btn-primary" onclick="addContact()">Add</button>
      </div>
    </div>
  </main>
</div>

<!-- ✅ Оверлей для закрытия сайдбара -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

{% block scripts %}
<!-- ✅ Порядок: jsQR → common.js → mobile-sidebar → ваш код -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="{{ url_for('static', filename='js/common.js') }}"></script>
<script src="{{ url_for('static', filename='js/mobile-sidebar.js') }}"></script>

<script>
// ✅ Защита от повторного выполнения скрипта
;(function() {
  if (window._contactsScriptLoaded) return;
  window._contactsScriptLoaded = true;

  // === Contacts-Specific State ===
  let allContacts = [];

  // === Load Contacts ===
  async function loadContacts() {
    const container = DOM.getById('contactsList');
    if (!container) return;

    try {
      const res = await fetch('/get_contacts');
      const data = await res.json();

      if (!res.ok || !data.contacts?.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">👥</div>
            <p>No contacts yet</p>
            <p class="text-muted">Add contacts to start chatting</p>
          </div>
        `;
        return;
      }

      allContacts = data.contacts;
      container.innerHTML = '';

      data.contacts.forEach((c, i) => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.dataset.address = c.address;

        item.innerHTML = `
          <div class="info">
            <div class="name truncate">${Utils.escapeHtml(c.name)}</div>
            <div class="address font-mono truncate" id="addr-${i}" title="Click to copy">${Utils.escapeHtml(c.address)}</div>
          </div>
          <div class="actions">
            <button class="btn btn-icon" onclick="copyAddress('addr-${i}')" title="Copy address">📋</button>
            <button class="btn btn-icon" onclick="startChat('${Utils.escapeAttr(c.address)}', '${Utils.escapeAttr(c.name)}')" title="Start chat">💬</button>
            <button class="btn btn-icon" style="color: var(--status-error);" onclick="deleteContact('${Utils.escapeAttr(c.address)}', this)" title="Delete">✕</button>
          </div>
        `;
        container.appendChild(item);
      });
    } catch (error) {
      console.error('Load contacts error:', error);
      container.innerHTML = '<p class="text-muted text-center">Failed to load</p>';
    }
  }

  // === Copy Address ===
  function copyAddress(elementId) {
    const el = DOM.getById(elementId);
    if (!el) return;
    Utils.copyToClipboard(el.textContent.trim());
    window.NotificationManager?.showToast('Address copied', 'success');
  }

  // === Start Chat ===
  function startChat(address, name) {
    const params = new URLSearchParams({ start_with: address, name });
    location.href = '/chat?' + params;
  }

  // === Add Contact ===
  async function addContact() {
    const name = DOM.getById('contactName')?.value.trim();
    const address = DOM.getById('contactAddress')?.value.trim();

    if (!name || !address) {
      window.NotificationManager?.showToast('Fill in both fields', 'warning');
      return false; // ✅ Возвращаем false для обработки из common.js
    }

    if (!Security.isValidAddress(address)) {
      window.NotificationManager?.showToast('Invalid address format', 'error');
      return false;
    }

    // ✅ Проверка: не добавлен ли контакт уже
    const exists = allContacts?.some(c => c.address.toLowerCase() === address.toLowerCase());
    if (exists) {
      window.NotificationManager?.showToast('Contact already exists', 'warning');
      const contact = allContacts.find(c => c.address.toLowerCase() === address.toLowerCase());
      startChat(address, contact.name);
      return true;
    }

    try {
      const res = await fetch('/add_contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, address })
      });
      const data = await res.json();

      if (res.ok) {
        DOM.getById('contactName').value = '';
        DOM.getById('contactAddress').value = '';
        await loadContacts();
        window.NotificationManager?.showToast('Contact added', 'success');
        return true;
      } else {
        window.NotificationManager?.showToast(data.error || 'Failed to add', 'error');
        return false;
      }
    } catch (error) {
      console.error('Add contact error:', error);
      window.NotificationManager?.showToast('Network error', 'error');
      return false;
    }
  }

  // === Delete Contact ===
  async function deleteContact(address, btn) {
    if (!confirm('Delete this contact?')) return;

    try {
      btn.disabled = true;
      const res = await fetch('/delete_contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address })
      });

      if (res.ok) {
        btn.closest('.list-item')?.remove();
        window.NotificationManager?.showToast('Contact deleted', 'success');
        if (!document.querySelector('.list-item')) {
          DOM.getById('contactsList').innerHTML = `
            <div class="empty-state">
              <div class="icon">👥</div>
              <p>No contacts</p>
            </div>
          `;
        }
      } else {
        const data = await res.json();
        window.NotificationManager?.showToast(data.error || 'Delete failed', 'error');
        btn.disabled = false;
      }
    } catch (error) {
      console.error('Delete error:', error);
      window.NotificationManager?.showToast('Network error', 'error');
      btn.disabled = false;
    }
  }

  // === Init ===
  document.addEventListener('DOMContentLoaded', function() {
    loadContacts();

    DOM.getById('contactAddress')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addContact();
      }
    });

    const params = new URLSearchParams(window.location.search);
    const startWith = params.get('start_with');
    const startName = params.get('name');
    if (startWith && startName) {
      setTimeout(() => startChat(decodeURIComponent(startWith), decodeURIComponent(startName)), 100);
    }
  });

  // ✅ ЭКСПОРТ ФУНКЦИЙ В ГЛОБАЛЬНУЮ ОБЛАСТЬ (для common.js)
  window.addContact = addContact;
  window.startChat = startChat;
  window.loadContacts = loadContacts;
  window.copyAddress = copyAddress;      // ← ДОБАВИТЬ
  window.deleteContact = deleteContact;  // ← ДОБАВИТЬ

})();
</script>
{% endblock %}
{% endblock %}
