{% extends "base.html" %}

{% block title %}Contacts — Dark Messenger{% endblock %}

{% block content %}
<div class="chat-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <header class="sidebar-header">
      <div class="user-info">
        <span class="address font-mono" id="userAddress">{{ address[:10] }}…</span>
        <button class="btn btn-ghost btn-icon" onclick="location.href='/logout'" aria-label="Logout">⏻</button>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab" onclick="location.href='/chat'">Chat</button>
      <button class="tab active" role="tab" aria-selected="true" onclick="location.href='/contacts'">Contacts</button>
      <button class="tab" onclick="location.href='/groups'">Groups</button>
      <button class="tab" onclick="location.href='/profile'">Profile</button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="chat-header">
      <h2>Contacts</h2>
      <button class="btn btn-primary" onclick="openQRScanner()">📷 Scan QR</button>
    </header>

    <!-- QR Scanner -->
    <div id="qrScannerContainer" class="hidden" style="padding: var(--space-md); background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
      <div class="text-center">
        <div style="position: relative; display: inline-block; margin-bottom: var(--space-sm);">
          <video id="qrVideo" style="width: 200px; height: 200px; border-radius: var(--radius-md); background: #000;"></video>
          <div style="position: absolute; inset: 0; border: 2px solid var(--accent); border-radius: var(--radius-md); pointer-events: none;"></div>
        </div>
        <p class="text-muted" style="font-size: 12px;">Point camera at QR code</p>
        <div id="scanResult" class="hidden" style="margin-top: var(--space-sm); color: var(--status-success); font-weight: 500;"></div>
        <button class="btn btn-ghost" onclick="forceCloseQRScanner()" style="margin-top: var(--space-sm);">Cancel</button>
      </div>
    </div>

    <!-- Contacts List -->
    <div class="list-container" id="contactsList">
      <div class="loading">Loading contacts…</div>
    </div>

    <!-- Add Contact Form -->
    <div style="padding: var(--space-md); border-top: 1px solid var(--border-color); background: var(--bg-secondary);">
      <div style="display: flex; gap: var(--space-sm);">
        <input type="text" id="contactName" class="input" placeholder="Name" style="flex: 1;">
        <input type="text" id="contactAddress" class="input input-monospace" placeholder="64-char address" maxlength="64" style="flex: 2;">
        <button class="btn btn-primary" onclick="addContact()">Add</button>
      </div>
    </div>
  </main>
</div>

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
// === State ===
const QR = { stream: null, interval: null, active: false };
let allContacts = [];

// === Utilities ===
const Utils = {
  escapeHtml: (str) => {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  },
  escapeAttr: (str) => String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#x27;')
};

// === Load Contacts ===
async function loadContacts() {
  const container = document.getElementById('contactsList');

  try {
    const res = await fetch('/get_contacts');
    const data = await res.json();

    if (!res.ok || !data.contacts?.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">👥</div>
          <p>No contacts yet</p>
          <p class="text-muted">Add contacts to start chatting</p>
        </div>
      `;
      return;
    }

    allContacts = data.contacts;
    container.innerHTML = '';

    data.contacts.forEach((c, i) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.dataset.address = c.address;

      item.innerHTML = `
        <div class="info">
          <div class="name truncate">${Utils.escapeHtml(c.name)}</div>
          <div class="address font-mono truncate" id="addr-${i}" title="Click to copy">${Utils.escapeHtml(c.address)}</div>
        </div>
        <div class="actions">
          <button class="btn btn-icon" onclick="copyAddress('addr-${i}')" title="Copy address">📋</button>
          <button class="btn btn-icon" onclick="startChat('${Utils.escapeAttr(c.address)}', '${Utils.escapeAttr(c.name)}')" title="Start chat">💬</button>
          <button class="btn btn-icon" style="color: var(--status-error);" onclick="deleteContact('${Utils.escapeAttr(c.address)}', this)" title="Delete">✕</button>
        </div>
      `;

      container.appendChild(item);
    });
  } catch (error) {
    console.error('Load contacts error:', error);
    container.innerHTML = '<p class="text-muted text-center">Failed to load</p>';
  }
}

// === Copy Address ===
function copyAddress(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;

  Utils.copyToClipboard(el.textContent.trim(), null);
  window.NotificationManager?.showToast('Address copied', 'success');
}

// === Start Chat ===
function startChat(address, name) {
  const params = new URLSearchParams({ start_with: address, name });
  location.href = '/chat?' + params;
}

// === Add Contact ===
async function addContact() {
  const name = document.getElementById('contactName')?.value.trim();
  const address = document.getElementById('contactAddress')?.value.trim();

  if (!name || !address) {
    window.NotificationManager?.showToast('Fill in both fields', 'warning');
    return;
  }

  if (address.length !== 64 || !/^[a-fA-F0-9]{64}$/.test(address)) {
    window.NotificationManager?.showToast('Invalid address format', 'error');
    return;
  }

  try {
    const res = await fetch('/add_contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, address })
    });

    const data = await res.json();

    if (res.ok) {
      document.getElementById('contactName').value = '';
      document.getElementById('contactAddress').value = '';
      await loadContacts();
      window.NotificationManager?.showToast('Contact added', 'success');
    } else {
      window.NotificationManager?.showToast(data.error || 'Failed to add', 'error');
    }
  } catch (error) {
    console.error('Add contact error:', error);
    window.NotificationManager?.showToast('Network error', 'error');
  }
}

// === Delete Contact ===
async function deleteContact(address, btn) {
  if (!confirm('Delete this contact?')) return;

  try {
    btn.disabled = true;

    const res = await fetch('/delete_contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ address })
    });

    if (res.ok) {
      btn.closest('.list-item')?.remove();
      window.NotificationManager?.showToast('Contact deleted', 'success');

      // Show empty state if needed
      if (!document.querySelector('.list-item')) {
        document.getElementById('contactsList').innerHTML = `
          <div class="empty-state">
            <div class="icon">👥</div>
            <p>No contacts</p>
          </div>
        `;
      }
    } else {
      const data = await res.json();
      window.NotificationManager?.showToast(data.error || 'Delete failed', 'error');
      btn.disabled = false;
    }
  } catch (error) {
    console.error('Delete error:', error);
    window.NotificationManager?.showToast('Network error', 'error');
    btn.disabled = false;
  }
}

// === QR Scanner ===
function openQRScanner() {
  if (QR.active) return;

  const container = document.getElementById('qrScannerContainer');
  const video = document.getElementById('qrVideo');
  const result = document.getElementById('scanResult');

  if (!container || !video) return;

  QR.active = true;
  container.classList.remove('hidden');
  result.classList.add('hidden');

  if (navigator.mediaDevices?.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        if (!QR.active) {
          stream.getTracks().forEach(t => t.stop());
          return;
        }

        QR.stream = stream;
        video.srcObject = stream;
        video.play().then(() => startScanning()).catch(() => closeQR());
      })
      .catch(err => {
        console.error('Camera error:', err);
        window.NotificationManager?.showToast('Camera access denied', 'error');
        closeQR();
      });
  } else {
    window.NotificationManager?.showToast('Camera not supported', 'error');
    closeQR();
  }
}

function startScanning() {
  const video = document.getElementById('qrVideo');
  const result = document.getElementById('scanResult');

  if (!video || !QR.active) return;

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  QR.interval = setInterval(() => {
    if (!QR.active || video.readyState !== video.HAVE_ENOUGH_DATA) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    try {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);

      if (code?.data) {
        let address = '';

        if (code.data.length === 64 && /^[a-fA-F0-9]{64}$/.test(code.data)) {
          address = code.data;
        } else if (code.data.toLowerCase().startsWith('bitcoin:')) {
          const match = code.data.match(/bitcoin:([a-zA-Z0-9]{64})/i);
          if (match?.[1]) address = match[1];
        }

        if (address) {
          closeQR();
          document.getElementById('contactAddress').value = address;
          result.textContent = '✓ Address scanned';
          result.classList.remove('hidden');
          window.NotificationManager?.showToast('Address scanned', 'success');
        }
      }
    } catch (e) { /* continue */ }
  }, 300);
}

function closeQR() {
  QR.active = false;

  if (QR.interval) {
    clearInterval(QR.interval);
    QR.interval = null;
  }

  if (QR.stream) {
    QR.stream.getTracks().forEach(t => t.stop());
    QR.stream = null;
  }

  const container = document.getElementById('qrScannerContainer');
  const video = document.getElementById('qrVideo');

  if (container) container.classList.add('hidden');
  if (video) {
    video.pause();
    video.srcObject = null;
  }
}

function forceCloseQRScanner() {
  closeQR();
  document.getElementById('scanResult')?.classList.add('hidden');
}

// === Init ===
document.addEventListener('DOMContentLoaded', function() {
  loadContacts();

  // Handle Enter in address field
  document.getElementById('contactAddress')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addContact();
    }
  });

  // Handle URL param
  const params = new URLSearchParams(window.location.search);
  const startWith = params.get('start_with');
  const startName = params.get('name');
  if (startWith && startName) {
    setTimeout(() => startChat(decodeURIComponent(startWith), decodeURIComponent(startName)), 100);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeQR();
  });
});

// === Cleanup ===
window.addEventListener('beforeunload', closeQR);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) closeQR();
});
</script>
{% endblock %}
{% endblock %}
