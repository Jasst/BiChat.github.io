<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Test — Dark Messenger</title>
  <style>
    body { font-family: monospace; background: #121212; color: #e0e0e0; padding: 20px; }
    .test { margin: 15px 0; padding: 10px; border-left: 3px solid #555; }
    .ok { border-color: #00c853; color: #00c853; }
    .fail { border-color: #cf6679; color: #cf6679; }
    .pending { border-color: #ff9800; color: #ff9800; }
    code { background: #2c2c2c; padding: 2px 6px; border-radius: 3px; }
    #log { margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>🔌 WebSocket & Realtime Test</h2>
  <p>Testing connection capabilities on this host...</p>

  <div id="results"></div>
  <div id="log"></div>

  <script>
    const results = document.getElementById('results');
    const log = msg => {
      console.log(msg);
      document.getElementById('log').textContent += msg + '\n';
    };

    function addTest(name, status, details = '') {
      const div = document.createElement('div');
      div.className = `test ${status}`;
      div.innerHTML = `<strong>${name}</strong>: ${status.toUpperCase()}${details ? `<br><small>${details}</small>` : ''}`;
      results.appendChild(div);
    }

    // === Тест 1: Исходящий WebSocket к публичному релею ===
    addTest('Outgoing WebSocket (wss://gun.robins.one)', 'pending', 'Connecting...');
    const ws = new WebSocket('wss://gun.robins.one/gun');
    ws.onopen = () => {
      addTest('Outgoing WebSocket (wss://gun.robins.one)', 'ok', 'Connection established');
      ws.close();
    };
    ws.onerror = (e) => {
      addTest('Outgoing WebSocket (wss://gun.robins.one)', 'fail', 'Blocked by firewall/proxy');
    };
    ws.onclose = () => {
      log('ℹ️ WebSocket test completed');
    };

    // === Тест 2: SSE к вашему серверу ===
    setTimeout(() => {
      addTest('SSE to /p2p-stream', 'pending', 'Testing...');
      try {
        const evt = new EventSource('/p2p-stream');
        evt.onopen = () => addTest('SSE to /p2p-stream', 'ok', 'Server supports text/event-stream');
        evt.onerror = () => addTest('SSE to /p2p-stream', 'fail', 'Blocked or not implemented');
        setTimeout(() => evt.close(), 2000);
      } catch (e) {
        addTest('SSE to /p2p-stream', 'fail', 'EventSource not supported: ' + e.message);
      }
    }, 3000);

    // === Тест 3: Long Polling ===
    setTimeout(() => {
      addTest('Long Polling (HTTP GET)', 'pending', 'Sending request...');
      fetch('/p2p-poll?chat=test&since=0')
        .then(r => {
          if (r.ok) addTest('Long Polling (HTTP GET)', 'ok', `Status: ${r.status}`);
          else addTest('Long Polling (HTTP GET)', 'fail', `Status: ${r.status}`);
        })
        .catch(e => addTest('Long Polling (HTTP GET)', 'fail', 'Network error: ' + e.message));
    }, 6000);

    // === Тест 4: Проверка, что GunDB загружается ===
    setTimeout(() => {
      addTest('GunDB Library Load', 'pending', 'Loading from CDN...');
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/gun/gun.js';
      script.onload = () => {
        if (typeof Gun !== 'undefined') {
          addTest('GunDB Library Load', 'ok', 'Gun is available');

          // Тест 5: Инициализация Gun с локальным хранилищем
          addTest('GunDB localStorage', 'pending', 'Initializing...');
          try {
            const gun = Gun({ peers: [], localStorage: true, radisk: false });
            gun.get('test-key').put({ ts: Date.now() });
            gun.get('test-key').once(data => {
              if (data?.ts) {
                addTest('GunDB localStorage', 'ok', 'Read/write works');
              } else {
                addTest('GunDB localStorage', 'fail', 'Data not retrieved');
              }
            });
          } catch (e) {
            addTest('GunDB localStorage', 'fail', 'Error: ' + e.message);
          }
        } else {
          addTest('GunDB Library Load', 'fail', 'Gun not defined after load');
        }
      };
      script.onerror = () => addTest('GunDB Library Load', 'fail', 'CDN blocked or unreachable');
      document.head.appendChild(script);
    }, 9000);
  </script>
</body>
</html>
