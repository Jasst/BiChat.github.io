{% extends "base.html" %}

{% block title %}Login — Dark Messenger{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card animate-fade">
    <h1>Login</h1>
    <p class="subtitle">Enter your 24-word mnemonic phrase to access your account</p>

    <form id="loginForm" class="auth-form">
      <!-- ✅ name="mnemonic" добавлен для корректной работы FormData -->
      <textarea
        id="mnemonic"
        name="mnemonic"
        placeholder="Enter your mnemonic phrase"
        rows="5"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        autofocus
        required
        class="input input-monospace"
        style="font-size: 13px; line-height: 1.6;"
      ></textarea>

      <div id="errorMsg" class="hidden error"></div>

      <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%;">Login</button>
    </form>

    <div class="auth-footer">
      <a href="/">← Back to Home</a>
    </div>
  </div>
</div>

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const error = document.getElementById('errorMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = 'Logging in...';
    error.classList.add('hidden');

    try {
      const mnemonic = document.getElementById('mnemonic').value.trim();

      // 🔍 Клиентская валидация
      if (!mnemonic) {
        throw new Error('Mnemonic phrase is required');
      }
      const words = mnemonic.split(/\s+/).filter(w => w.length > 0);
      if (words.length < 24) {
        throw new Error(`Expected 24 words, got ${words.length}`);
      }

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mnemonic_phrase: mnemonic })
      });

      const data = await res.json();

      if (res.ok) {
        window.location.href = '/chat';
      } else {
        // 🔧 Корректное извлечение ошибки из объекта Marshmallow
        let msg = 'Login failed';
        if (typeof data.error === 'string') {
          msg = data.error;
        } else if (typeof data.error === 'object' && data.error !== null) {
          for (const key in data.error) {
            const val = data.error[key];
            if (Array.isArray(val) && val.length > 0) {
              msg = val[0];
              break;
            }
            if (typeof val === 'string') {
              msg = val;
              break;
            }
          }
        }

        error.textContent = 'Error: ' + msg;
        error.classList.remove('hidden');
        throw new Error(msg);
      }
    } catch (err) {
      console.error('Login error:', err);
    } finally {
      btn.disabled = false;
      btn.textContent = originalText;
    }
  });
});
</script>
{% endblock %}
{% endblock %}
