{% extends "base.html" %}

{% block title %}Login — Dark Messenger{% endblock %}

{% block content %}
<style>
  /* === Единая тема из wallet.html === */
  :root {
    --glass-bg: rgba(20, 20, 30, 0.6);
    --glass-border: rgba(255, 255, 255, 0.08);
    --accent-color: #6c5ce7;
    --accent-glow: rgba(108, 92, 231, 0.4);
    --success-color: #00b894;
    --danger-color: #d63031;
    --text-main: #f5f6fa;
    --text-muted: #a4b0be;
    --bg-primary: #0a0a0f;
  }

  /* Анимация */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
    animation: fadeInUp 0.6s ease-out;
  }

  /* Стеклянная карточка — как .glass-card */
  .auth-card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 32px 28px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    max-width: 480px;
    width: 100%;
  }

  .auth-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
  }

  .auth-card h1 {
    color: var(--text-main);
    font-weight: 700;
    font-size: 28px;
    margin-top: 0;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* Поля ввода — как .input в wallet */
  .input {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--glass-border);
    border-radius: 50px;
    padding: 12px 20px;
    color: var(--text-main);
    font-size: 14px;
    outline: none;
    transition: border 0.3s;
    width: 100%;
    box-sizing: border-box;
    font-family: inherit;
  }

  .input:focus {
    border-color: var(--accent-color);
  }

  .input-monospace {
    font-family: monospace;
    border-radius: 16px; /* для textarea чуть скруглённее, но оставим 50px? лучше 16px для удобства */
    resize: vertical;
    min-height: 100px;
  }

  /* Группы формы */
  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    color: var(--text-muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .form-group label input[type="checkbox"] {
    accent-color: var(--accent-color);
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  /* Кнопка — как .btn-primary-oval в wallet */
  .btn-primary-oval {
    padding: 14px 24px;
    border-radius: 50px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    background: linear-gradient(135deg, var(--accent-color), #6c5ce7);
    color: white;
    font-size: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 4px 15px var(--accent-glow);
  }

  .btn-primary-oval:hover {
    opacity: 0.9;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--accent-glow);
  }

  .btn-primary-oval:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .full-width {
    width: 100%;
  }

  /* Ошибка */
  .error {
    color: var(--danger-color);
    font-weight: 600;
    margin-top: 5px;
    font-size: 14px;
  }
  .hidden {
    display: none !important;
  }

  /* Ссылка в подвале */
  .auth-footer {
    margin-top: 24px;
    text-align: center;
  }

  .auth-footer a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }

  .auth-footer a:hover {
    color: var(--text-main);
    text-decoration: underline;
  }

  /* Адаптив */
  @media (max-width: 500px) {
    .auth-card {
      padding: 24px 18px;
    }
    .auth-card h1 {
      font-size: 24px;
    }
  }
</style>

<div class="auth-container">
  <div class="auth-card">
    <h1 data-i18n="login_title">Login</h1>
    <p class="subtitle" data-i18n="enter_mnemonic">Enter your 24‑word mnemonic phrase</p>

    <form id="loginForm" class="auth-form">
      <input type="hidden" id="nonce" value="{{ nonce }}">
      <div class="form-group">
        <textarea id="mnemonic" placeholder="Enter your mnemonic phrase" rows="5" autocomplete="off" autocorrect="off" spellcheck="false" autofocus required class="input input-monospace" data-i18n-placeholder="mnemonic_placeholder"></textarea>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" id="rememberCheckbox" checked>
          <span data-i18n="remember_me">Remember me (encrypt and store wallet locally)</span>
        </label>
      </div>

      <div id="passwordGroup">
        <div class="form-group">
          <label data-i18n="encryption_password_required">Encryption password (required if remembering)</label>
          <input type="password" id="password" class="input" placeholder="Enter password" data-i18n-placeholder="enter_password">
        </div>
        <div class="form-group">
          <label data-i18n="confirm_password">Confirm password</label>
          <input type="password" id="confirmPassword" class="input" placeholder="Repeat password" data-i18n-placeholder="repeat_password">
        </div>
      </div>

      <div id="errorMsg" class="hidden error"></div>
      <button type="submit" class="btn-primary-oval full-width" id="loginBtn" data-i18n="login">Login</button>
    </form>

    <div class="auth-footer">
      <a href="#" id="backToHomeLink" data-i18n="back_to_home">← Back to Home</a>
    </div>
  </div>
</div>

<script src="{{ url_for('static', path='js/storage-encryption.js') }}"></script>
<script>
if (window._loginScriptLoaded) {
  console.warn('Login script already executed');
} else {
  window._loginScriptLoaded = true;

  document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const error = document.getElementById('errorMsg');
    const nonceEl = document.getElementById('nonce');
    const nonce = nonceEl ? nonceEl.value : '';

    const rememberCheckbox = document.getElementById('rememberCheckbox');
    const passwordGroup = document.getElementById('passwordGroup');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');

    rememberCheckbox.addEventListener('change', (e) => {
      passwordGroup.style.display = e.target.checked ? 'block' : 'none';
      if (!e.target.checked) {
        passwordInput.value = '';
        confirmInput.value = '';
      }
    });

    if (!nonce) {
      error.textContent = i18next.t('no_nonce');
      error.classList.remove('hidden');
      return;
    }

    let isSubmitting = false;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;
      isSubmitting = true;
      btn.disabled = true;
      btn.textContent = i18next.t('signing_in');
      error.classList.add('hidden');

      const remember = rememberCheckbox.checked;
      let password = passwordInput.value;
      const confirm = confirmInput.value;

      if (remember) {
        if (!password || password.length < 4) {
          error.textContent = i18next.t('password_min_length');
          error.classList.remove('hidden');
          isSubmitting = false;
          btn.disabled = false;
          btn.textContent = i18next.t('login');
          return;
        }
        if (password !== confirm) {
          error.textContent = i18next.t('passwords_do_not_match');
          error.classList.remove('hidden');
          isSubmitting = false;
          btn.disabled = false;
          btn.textContent = i18next.t('login');
          return;
        }
      } else {
        password = '';
      }

      try {
        const mnemonic = document.getElementById('mnemonic').value.trim();
        const words = mnemonic.split(/\s+/).filter(w => w.length > 0);
        if (words.length < 24) throw new Error(i18next.t('mnemonic_24_words'));

        if (typeof window.DarkCrypto === 'undefined') {
          throw new Error(i18next.t('crypto_not_loaded'));
        }

        const keys = await DarkCrypto.deriveKeyPair(mnemonic);
        const { signPrivateKey, compressedPubKey, address } = keys;

        const rawSignature = await DarkCrypto.signData(signPrivateKey, nonce);
        const signatureHex = Array.from(new Uint8Array(rawSignature)).map(b => b.toString(16).padStart(2, '0')).join('');
        const pubkeyB64 = DarkCrypto._toBase64(compressedPubKey);

        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, public_key: pubkeyB64, signature: signatureHex })
        });

        const data = await res.json();

        if (res.ok) {
          sessionStorage.setItem('mnemonic', mnemonic);
          if (remember && password) {
            const encrypted = await window.StorageEncryption.encryptMnemonic(mnemonic, password);
            localStorage.setItem('encrypted_mnemonic', encrypted);
          } else {
            localStorage.removeItem('encrypted_mnemonic');
          }
          window.location.href = '/chat';
        } else {
          let msg = i18next.t('login_failed');
          if (typeof data.error === 'string') msg = data.error;
          else if (typeof data.error === 'object') {
            const values = Object.values(data.error).flat();
            msg = values[0] || i18next.t('invalid_credentials');
          }
          error.textContent = i18next.t('error_prefix') + msg;
          error.classList.remove('hidden');
          isSubmitting = false;
          btn.disabled = false;
          btn.textContent = i18next.t('login');
        }
      } catch (err) {
        console.error(err);
        error.textContent = err.message || i18next.t('unexpected_error');
        error.classList.remove('hidden');
        isSubmitting = false;
        btn.disabled = false;
        btn.textContent = i18next.t('login');
      }
    });

    document.getElementById('backToHomeLink')?.addEventListener('click', async (e) => {
      e.preventDefault();
      sessionStorage.removeItem('mnemonic');
      try {
        const res = await fetch('/check_session');
        const data = await res.json();
        if (data.authenticated) {
          window.location.href = '/logout';
        } else {
          window.location.href = '/';
        }
      } catch (err) {
        window.location.href = '/';
      }
    });
  });
}
</script>
{% endblock %}
