{% extends "base.html" %}

{% block title %}Login — Dark Messenger{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card animate-fade">
    <h1>Login</h1>
    <p class="subtitle">Enter your 24-word mnemonic phrase to access your account</p>

    <form id="loginForm" class="auth-form">
      <textarea
        id="mnemonic"
        placeholder="Enter your mnemonic phrase"
        rows="5"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        autofocus
        required
        class="input input-monospace"
        style="font-size: 13px; line-height: 1.6;"
      ></textarea>

      <div id="errorMsg" class="hidden error"></div>

      <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%;">Login</button>
    </form>

    <div class="auth-footer">
      <a href="/">← Back to Home</a>
    </div>
  </div>
</div>

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const form = DOM.getById('loginForm');
  const btn = DOM.getById('loginBtn');
  const error = DOM.getById('errorMsg');

  FormHelpers.handleSubmit(form, btn, async (formData) => {
    const mnemonic = formData.get('mnemonic')?.toString().trim();

    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mnemonic_phrase: mnemonic })
    });
    const data = await res.json();

    if (res.ok) {
      window.location.href = '/chat';
    } else {
      error.textContent = 'Error: ' + (data.error || 'Login failed');
      DOM.show(error);
      throw new Error(data.error); // Для обработки в handleSubmit
    }
  });
});
</script>
{% endblock %}
{% endblock %}
