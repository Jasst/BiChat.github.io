{% extends "base.html" %}

{% block title %}Login — Dark Messenger{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1 data-i18n="login_title">Login</h1>
    <p class="subtitle" data-i18n="enter_mnemonic">Enter your 24‑word mnemonic phrase</p>

    <form id="loginForm" class="auth-form">
      <input type="hidden" id="nonce" value="{{ nonce }}">
      <textarea id="mnemonic" placeholder="Enter your mnemonic phrase" rows="5" autocomplete="off" autocorrect="off" spellcheck="false" autofocus required class="input input-monospace" data-i18n-placeholder="mnemonic_placeholder"></textarea>

      <div class="form-group">
        <label><input type="checkbox" id="rememberCheckbox" checked> <span data-i18n="remember_me">Remember me (encrypt and store wallet locally)</span></label>
      </div>
      <div id="passwordGroup">
        <div class="form-group">
          <label data-i18n="encryption_password_required">Encryption password (required if remembering)</label>
          <input type="password" id="password" class="input" placeholder="Enter password" data-i18n-placeholder="enter_password">
        </div>
        <div class="form-group">
          <label data-i18n="confirm_password">Confirm password</label>
          <input type="password" id="confirmPassword" class="input" placeholder="Repeat password" data-i18n-placeholder="repeat_password">
        </div>
      </div>

      <div id="errorMsg" class="hidden error"></div>
      <button type="submit" class="btn-primary-oval full-width" id="loginBtn" data-i18n="login">Login</button>
    </form>

    <div class="auth-footer">
      <a href="#" id="backToHomeLink" data-i18n="back_to_home">← Back to Home</a>
    </div>
  </div>
</div>

<script src="{{ url_for('static', path='js/storage-encryption.js') }}"></script>
<script>
if (window._loginScriptLoaded) {
  console.warn('Login script already executed');
} else {
  window._loginScriptLoaded = true;

  document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const error = document.getElementById('errorMsg');
    const nonceEl = document.getElementById('nonce');
    const nonce = nonceEl ? nonceEl.value : '';

    const rememberCheckbox = document.getElementById('rememberCheckbox');
    const passwordGroup = document.getElementById('passwordGroup');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');

    rememberCheckbox.addEventListener('change', (e) => {
      passwordGroup.style.display = e.target.checked ? 'block' : 'none';
      if (!e.target.checked) {
        passwordInput.value = '';
        confirmInput.value = '';
      }
    });

    if (!nonce) {
      error.textContent = i18next.t('no_nonce');
      error.classList.remove('hidden');
      return;
    }

    let isSubmitting = false;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;
      isSubmitting = true;
      btn.disabled = true;
      btn.textContent = i18next.t('signing_in');
      error.classList.add('hidden');

      const remember = rememberCheckbox.checked;
      let password = passwordInput.value;
      const confirm = confirmInput.value;

      if (remember) {
        if (!password || password.length < 4) {
          error.textContent = i18next.t('password_min_length');
          error.classList.remove('hidden');
          isSubmitting = false;
          btn.disabled = false;
          btn.textContent = i18next.t('login');
          return;
        }
        if (password !== confirm) {
          error.textContent = i18next.t('passwords_do_not_match');
          error.classList.remove('hidden');
          isSubmitting = false;
          btn.disabled = false;
          btn.textContent = i18next.t('login');
          return;
        }
      } else {
        password = '';
      }

      try {
        const mnemonic = document.getElementById('mnemonic').value.trim();
        const words = mnemonic.split(/\s+/).filter(w => w.length > 0);
        if (words.length < 24) throw new Error(i18next.t('mnemonic_24_words'));

        if (typeof window.DarkCrypto === 'undefined') {
          throw new Error(i18next.t('crypto_not_loaded'));
        }

        const keys = await DarkCrypto.deriveKeyPair(mnemonic);
        const { signPrivateKey, compressedPubKey, address } = keys;

        const rawSignature = await DarkCrypto.signData(signPrivateKey, nonce);
        const signatureHex = Array.from(new Uint8Array(rawSignature)).map(b => b.toString(16).padStart(2, '0')).join('');
        const pubkeyB64 = DarkCrypto._toBase64(compressedPubKey);

        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address, public_key: pubkeyB64, signature: signatureHex })
        });

        const data = await res.json();

        if (res.ok) {
          sessionStorage.setItem('mnemonic', mnemonic);
          if (remember && password) {
            const encrypted = await window.StorageEncryption.encryptMnemonic(mnemonic, password);
            localStorage.setItem('encrypted_mnemonic', encrypted);
          } else {
            localStorage.removeItem('encrypted_mnemonic');
          }
          window.location.href = '/chat';
        } else {
          let msg = i18next.t('login_failed');
          if (typeof data.error === 'string') msg = data.error;
          else if (typeof data.error === 'object') {
            const values = Object.values(data.error).flat();
            msg = values[0] || i18next.t('invalid_credentials');
          }
          error.textContent = i18next.t('error_prefix') + msg;
          error.classList.remove('hidden');
          isSubmitting = false;
          btn.disabled = false;
          btn.textContent = i18next.t('login');
        }
      } catch (err) {
        console.error(err);
        error.textContent = err.message || i18next.t('unexpected_error');
        error.classList.remove('hidden');
        isSubmitting = false;
        btn.disabled = false;
        btn.textContent = i18next.t('login');
      }
    });

    document.getElementById('backToHomeLink')?.addEventListener('click', async (e) => {
      e.preventDefault();
      sessionStorage.removeItem('mnemonic');
      try {
        const res = await fetch('/check_session');
        const data = await res.json();
        if (data.authenticated) {
          window.location.href = '/logout';
        } else {
          window.location.href = '/';
        }
      } catch (err) {
        window.location.href = '/';
      }
    });
  });
}
</script>
{% endblock %}
