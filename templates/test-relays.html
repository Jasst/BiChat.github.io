<!DOCTYPE html>
<html>
<head><title>Gun Relay Tester</title></head>
<body>
<h3>Testing Gun Relays...</h3>
<div id="results"></div>
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script>
const relays = [
  'https://gun.robins.one/gun',
  'https://relic.eastus.cloudapp.azure.com/gun',
  'https://gundb-relay-eb4x.onrender.com/gun',
  'https://gun-manhattan.herokuapp.com/gun',
];

const results = document.getElementById('results');

relays.forEach(url => {
  const div = document.createElement('div');
  div.textContent = `Testing ${url}...`;
  results.appendChild(div);

  const gun = Gun({ peers: [url], localStorage: false });
  const testKey = 'test_' + Date.now();

  gun.get(testKey).put({ ts: Date.now() });

  setTimeout(() => {
    gun.get(testKey).once(data => {
      if (data && data.ts) {
        div.innerHTML = `✅ <b>${url}</b> — OK`;
        div.style.color = 'green';
      } else {
        div.innerHTML = `❌ <b>${url}</b> — Failed`;
        div.style.color = 'red';
      }
      gun.off();
    }, { wait: 2000 });
  }, 1000);
});
</script>
</body>
</html>
