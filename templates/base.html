<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Decentralized encrypted messenger">
    <meta name="theme-color" content="#121212">
    <title>Dark Messenger</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- 🔗 GunDB библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>

    <!-- ⚙️ Наши модули -->
    <script src="{{ url_for('static', filename='js/gun-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/p2p-sync.js') }}"></script>

    <!-- 🔔 NotificationManager — единая точка для всех уведомлений -->
    <script>
    window.NotificationManager = {
      audioCtx: null,
      originalTitle: document.title,
      blinkInterval: null,
      initialized: false,
      lastNotificationTime: {}, // Prevent spam: { chatId: timestamp }

      async init() {
        if (this.initialized) return;
        this.initialized = true;

        const initAudio = () => {
          if (this.audioCtx) return;
          try { this.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
          catch (e) { console.debug('ℹ️ Web Audio not available'); }
        };
        document.addEventListener('click', initAudio, { once: true, passive: true });

        if ('Notification' in window && Notification.permission === 'default') {
          try { await Notification.requestPermission(); }
          catch (e) { console.debug('ℹ️ Notification request failed:', e); }
        }
      },

      _normalizeChatId(chatId) {
        // Унифицируем формат: group:xxx или просто адрес
        if (!chatId) return '';
        return chatId.startsWith('group:') ? chatId.toLowerCase() : chatId.toLowerCase().trim();
      },

      _isActiveChat(chatId) {
        const current = this._normalizeChatId(window.currentChatAddress || '');
        const target = this._normalizeChatId(chatId);
        return document.visibilityState === 'visible' && current === target;
      },

      _shouldNotify(chatId) {
        // Анти-спам: не чаще 1 уведомления в 2 секунды на чат
        const now = Date.now();
        const last = this.lastNotificationTime[chatId] || 0;
        if (now - last < 2000) return false;
        this.lastNotificationTime[chatId] = now;
        return true;
      },

      playSound(frequency = 800, duration = 0.2, volume = 0.1) {
        try {
          if (!this.audioCtx) return;
          if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
          
          const osc = this.audioCtx.createOscillator();
          const gain = this.audioCtx.createGain();
          osc.connect(gain); 
          gain.connect(this.audioCtx.destination);
          
          osc.frequency.value = frequency; 
          osc.type = 'sine';
          gain.gain.setValueAtTime(volume, this.audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
          
          osc.start(); 
          osc.stop(this.audioCtx.currentTime + duration);
        } catch (e) { 
          console.debug('ℹ️ Sound play failed:', e); 
        }
      },

      show(sender, chatId, isGroup = false, preview = '🔐 Новое сообщение', messageId = null) {
        const normalizedChatId = this._normalizeChatId(chatId);
        
        // 🔇 Не уведомляем, если пользователь в этом чате И вкладка активна
        if (this._isActiveChat(normalizedChatId)) {
          return { notified: false, reason: 'active_chat' };
        }
        
        // 🚫 Анти-спам проверка
        if (!this._shouldNotify(normalizedChatId)) {
          return { notified: false, reason: 'rate_limit' };
        }

        // 🔊 Всегда проигрываем звук (даже если вкладка активна — для тактильного отклика)
        const isGroupChat = isGroup || normalizedChatId.startsWith('group:');
        this.playSound(isGroupChat ? 600 : 800, 0.18, 0.08);

        const senderName = (sender || 'Unknown').substring(0, 15) + (sender?.length > 15 ? '…' : '');
        const title = isGroupChat ? `👥 ${senderName}` : `💬 ${senderName}`;

        // 🖥️ Desktop notification
        if ('Notification' in window && Notification.permission === 'granted') {
          try {
            const n = new Notification(title, {
              body: preview,
              icon: '/static/favicon.ico',
              tag: `msg-${normalizedChatId}`,
              requireInteraction: true,
              silent: true // Мы сами управляем звуком
            });
            n.onclick = () => {
              window.focus();
              if (typeof window.selectConversation === 'function') {
                window.selectConversation(chatId, senderName, isGroupChat);
              } else {
                const url = `/chat?start_with=${encodeURIComponent(chatId)}&name=${encodeURIComponent(senderName)}`;
                window.location.href = url;
              }
              n.close();
            };
            setTimeout(() => n.close(), 8000);
          } catch (e) { 
            console.debug('ℹ️ Notification failed:', e); 
          }
        }

        // 🔁 Мигание заголовка только если вкладка неактивна
        if (document.visibilityState !== 'visible') {
          this.startBlink(title);
        }

        return { notified: true, chatId: normalizedChatId };
      },

      startBlink(text) {
        if (this.blinkInterval) return;
        let toggle = true;
        const original = this.originalTitle;
        this.blinkInterval = setInterval(() => {
          document.title = toggle ? `🔔 ${text}` : original;
          toggle = !toggle;
        }, 1000);
      },

      stopBlink() {
        if (this.blinkInterval) {
          clearInterval(this.blinkInterval);
          this.blinkInterval = null;
          document.title = this.originalTitle;
        }
      },

      // 🔄 Вызывать при переключении чата или активации вкладки
      onChatFocus(chatId) {
        const normalized = this._normalizeChatId(chatId);
        // Очистить лимит для этого чата
        delete this.lastNotificationTime[normalized];
        this.stopBlink();
      }
    };

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      window.NotificationManager?.init();
    });
    
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        window.NotificationManager?.stopBlink();
        // Если есть активный чат — сбросить лимит уведомлений для него
        if (window.currentChatAddress) {
          window.NotificationManager?.onChatFocus(window.currentChatAddress);
        }
      }
    });
    </script>

    <!-- 🚀 Глобальная инициализация P2P -->
    <script>
    document.addEventListener('DOMContentLoaded', async function() {
      const userAddressEl = document.getElementById('userAddress');
      const addressInput = document.getElementById('address');
      const userAddress = (userAddressEl?.dataset?.fullAddress ||
                          addressInput?.value ||
                          '').trim();

      if (!userAddress || userAddress.length !== 64) {
        console.log('⚠️ P2P init skipped: user address not ready');
        return;
      }

      const gunReady = await window.GunConfig?.init(userAddress);
      if (!gunReady) {
        console.warn('⚠️ P2P sync disabled: Gun not available');
        return;
      }

      window.p2p = new P2PSync();
      console.log('✅ P2P sync ready');

      // 📡 Подписка на ВСЕ чаты для фоновых уведомлений
      window.subscribeToAllChats = async function() {
        try {
          const res = await fetch('/get_conversations');
          const data = await res.json();
          if (data.conversations) {
            data.conversations.forEach(conv => {
              const chatId = conv.is_group ? `group:${conv.address}` : conv.address;
              window.p2p.subscribe(chatId, async (msg) => {
                // 🎯 Единая точка обработки входящих P2P сообщений
                if (window.NotificationManager?.show) {
                  const preview = msg.preview || '🔐 Новое зашифрованное сообщение';
                  const isGroup = chatId.startsWith('group:');
                  
                  window.NotificationManager.show(
                    msg.sender,
                    chatId,
                    isGroup,
                    preview,
                    msg.id
                  );
                }
              });
            });
            console.log(`✅ Subscribed to ${data.conversations.length} chats for notifications`);
          }
        } catch (e) {
          console.warn('⚠️ Failed to subscribe to all chats:', e);
        }
      };

      await window.subscribeToAllChats();
      window.currentChatAddress = window.currentChatAddress || '';
    });

    window.addEventListener('beforeunload', () => {
      window.p2p?.unsubscribeAll();
      window.GunConfig?.clearSensitive?.();
    });
    </script>
</body>
</html>
