<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Decentralized encrypted messenger">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">

  <title>{% block title %}Dark Messenger{% endblock %}</title>

  <!-- Favicon -->
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  {% block head_extra %}{% endblock %}
</head>
<body>
  <!-- Skip link for accessibility -->
  <a href="#main" class="sr-only">Skip to main content</a>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <!-- Global notification container -->
  <div id="notification-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/sea.js" defer></script>

  <!-- App modules -->
  <script src="{{ url_for('static', filename='js/gun-config.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/p2p-sync.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/notification-manager.js') }}" defer></script>

  <!-- P2P Initialization -->
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      // Get user address from page
      const userAddressEl = document.getElementById('userAddress');
      const addressInput = document.getElementById('address');
      const userAddress = (
        userAddressEl?.dataset?.fullAddress ||
        addressInput?.value ||
        ''
      ).trim();

      // Skip if address not ready
      if (!userAddress || userAddress.length !== 64) {
        console.log('⚠️ P2P init skipped: address not ready');
        return;
      }

      // Initialize GunDB
      const gunReady = await window.GunConfig?.init(userAddress);
      if (!gunReady) {
        console.warn('⚠️ P2P sync disabled: Gun not available');
        return;
      }

      // Initialize P2P sync
      window.p2p = new P2PSync();
      console.log('✅ P2P sync ready');

      // Global chat subscription helper
      window.subscribeToAllChats = async function() {
        console.log('ℹ️ subscribeToAllChats: notifications handled by NotificationManager');
      };
    });

    // Cleanup on unload
    window.addEventListener('beforeunload', () => {
      window.p2p?.unsubscribeAll();
      window.GunConfig?.clearSensitive?.();
      window.NotificationManager?.destroy();
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
