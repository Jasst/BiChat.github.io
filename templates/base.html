<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Decentralized encrypted messenger">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">

  <title>{% block title %}Dark Messenger{% endblock %}</title>

  <!-- Favicon -->
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  {% block head_extra %}{% endblock %}
</head>
<body>
  <!-- Skip link for accessibility -->
  <a href="#main" class="sr-only">Skip to main content</a>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <!-- Global notification container -->
  <div id="notification-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Libraries -->

<!-- Клиентская криптография -->
  <script src="{{ url_for('static', filename='js/common.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/crypto-client.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/notification-manager.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/global-notifications.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/mnemonic-manager.js') }}" defer></script>
  <script>
// Проверка авторизации (защита маршрутов)
(function() {
  const publicPaths = ['/', '/login'];
  if (!publicPaths.includes(window.location.pathname)) {
    const mnemonic = sessionStorage.getItem('mnemonic');
    if (!mnemonic || mnemonic.split(/\s+/).length < 24) {
      sessionStorage.removeItem('mnemonic');
      window.location.href = '/login';
    } else {
      // Устанавливаем глобальную переменную для использования на странице
      window.appMnemonic = mnemonic;
    }
  }
})();
</script>

  {% block scripts %}{% endblock %}
</body>
</html>
